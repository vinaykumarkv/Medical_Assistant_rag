<!-- ui/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modular RAG App</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, sans-serif; }
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1e1e2e; color: #cdd6f4; }
        #chat-container { width: 500px; height: 650px; background: #252538; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; border: 1px solid #45475a; }
        #chat-header { background: #11111b; padding: 20px; text-align: center; font-weight: bold; color: #89b4fa; }
        #chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #181825; }
        .message { padding: 12px; border-radius: 8px; max-width: 80%; line-height: 1.4; }
        .user { background: #89b4fa; color: #11111b; align-self: flex-end; }
        .bot { background: #313244; color: #cdd6f4; align-self: flex-start; }
        #input-area { display: flex; background: #1e1e2e; padding: 12px; }
        #user-input { flex: 1; padding: 12px; background: #313244; border: 1px solid #45475a; border-radius: 6px; color: #cdd6f4; outline: none; }
        #send-btn { background: #89b4fa; color: #11111b; border: none; padding: 0 20px; margin-left: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-container">
    <div id="chat-header">Local Folder-Mapped RAG</div>
    <div id="chat-box"></div>
    <div id="input-area">
        <input type="text" id="user-input" placeholder="Query your data documents..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>
</div>

<script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function appendMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message', sender);
        msgDiv.textContent = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
        return msgDiv;
    }

    async function handleSendMessage() {
        const query = userInput.value.trim();
        if (!query) return;

        appendMessage(query, 'user');
        userInput.value = '';
        const botBubble = appendMessage('', 'bot');

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: query })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');
                
                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        try {
                            const data = JSON.parse(line.slice(6));
                            if (data.text) {
                                botBubble.textContent += data.text;
                                chatBox.scrollTop = chatBox.scrollHeight;
                            }
                        } catch (e) {}
                    }
                }
            }
        } catch (error) {
            botBubble.textContent = "Error: Stream interrupted.";
        }
    }

    sendBtn.addEventListener('click', handleSendMessage);
    userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSendMessage(); });
</script>
</body>
</html>
